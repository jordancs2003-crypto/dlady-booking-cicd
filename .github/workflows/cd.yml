name: Entrega y despliegue continuo

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validar versión
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar controles
        run: npm run check

      - name: Auditar dependencias
        run: npm audit --audit-level=high

  publish:
    name: Publicar imagen Docker
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      image: ${{ steps.image.outputs.value }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Convertir nombre de imagen a minúsculas
        id: image
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          echo "value=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar metadatos
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Desplegar en producción
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production

    steps:
      - name: Solicitar despliegue en Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        shell: bash
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "No se configuró el secreto RENDER_DEPLOY_HOOK."
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_DEPLOY_HOOK"

      - name: Resumen del despliegue
        run: |
          echo "## Despliegue completado" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ambiente: producción" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Imagen: ${{ needs.publish.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"